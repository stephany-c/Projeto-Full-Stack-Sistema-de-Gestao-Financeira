<div class="confirm-dialog-container" [class.destructive]="data.isDestructive">
    <div class="header">
        <div class="icon-circle">
            <mat-icon>{{ data.isDestructive ? 'warning' : 'help_outline' }}</mat-icon>
        </div>
        <h1 mat-dialog-title>{{ data.title }}</h1>
    </div>

    <div mat-dialog-content class="message">
        <p>{{ data.message }}</p>
    </div>

    <div mat-dialog-actions align="end" class="actions">
        <button mat-button (click)="onCancel()" class="cancel-btn">
            {{ data.cancelText || 'Cancelar' }}
        </button>
        <button mat-flat-button [color]="data.isDestructive ? 'warn' : 'primary'" (click)="onConfirm()"
            class="confirm-btn">
            {{ data.confirmText || 'Confirmar' }}
        </button>
    </div>
</div>
