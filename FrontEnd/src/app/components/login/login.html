<div class="auth-container">
    <mat-card class="auth-card">
        <div class="brand-header">
            <span class="logo-icon"><i class="fa-solid fa-wallet"></i></span>
            <h2>FinançaX</h2>
        </div>

        <h1>Bem-vindo!</h1>
        <p>Acesse sua conta para organizar suas finanças.</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>E-mail</mat-label>
                <mat-icon matPrefix>email</mat-icon>
                <input matInput type="email" formControlName="email" placeholder="seu@email.com">
                <mat-error
                    *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)">
                    <span *ngIf="loginForm.get('email')?.errors?.['required']">O e-mail é obrigatório.</span>
                    <span *ngIf="loginForm.get('email')?.errors?.['email']">Digite um e-mail válido.</span>
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Senha</mat-label>
                <mat-icon matPrefix>lock</mat-icon>
                <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password"
                    placeholder="Sua senha" (focus)="passwordFocused = true" (blur)="passwordFocused = false">
                <button mat-icon-button matSuffix type="button" (mousedown)="togglePassword($event)"
                    *ngIf="passwordFocused">
                    <mat-icon>{{showPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error
                    *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)">
                    A senha é obrigatória.
                </mat-error>
            </mat-form-field>

            <div class="login-error" *ngIf="errorMessage">
                <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
            </div>

            <button mat-flat-button color="primary" type="submit" class="btn-primary" [disabled]="loginForm.invalid">
                <span>Entrar</span>
                <mat-icon iconPositionEnd>arrow_forward</mat-icon>
            </button>
        </form>

        <div class="auth-footer">
            Ainda não tem conta? <a routerLink="/register">Criar conta</a>
        </div>
    </mat-card>
</div>
